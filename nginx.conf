events {
  worker_connections 1024;
}

http {
  # Rate limiting zone for API endpoints
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  upstream backend {
    ip_hash;  # sticky sessions — same client always hits same instance
    server backend_1:5000 max_fails=3 fail_timeout=30s;
    server backend_2:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  server {
    listen 80;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client body size limit (match backend)
    client_max_body_size 10m;

    # Health check endpoint (no rate limit)
    location /health {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      access_log off;
    }

    # Static uploads (served by nginx directly)
    location /uploads {
      alias /app/uploads;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    location / {
      # Rate limiting with burst allowance
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://backend;

      # WebSocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Keep socket connections alive
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      
      # Connection keepalive
      proxy_set_header Connection "";
    }
  }
}